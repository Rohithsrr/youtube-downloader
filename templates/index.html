<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private YouTube Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: '#0d1117',
                            card: '#161b22',
                            border: '#30363d',
                            text: '#e6edf3',
                            muted: '#8b949e',
                            accent: '#58a6ff',
                            accentHover: '#79b8ff',
                            success: '#238636',
                            successHover: '#2ea043',
                            danger: '#da3633',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .quality-option { transition: all 0.15s ease; }
        .quality-option:hover { border-color: #58a6ff; background: rgba(88, 166, 255, 0.08); }
        .quality-option.selected { border-color: #58a6ff; background: rgba(88, 166, 255, 0.15); box-shadow: 0 0 0 1px #58a6ff; }
        .spinner { border-top-color: #58a6ff; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.25s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: #161b22; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #484f58; }
        input[type="url"]::placeholder { color: #484f58; }
        .focus-ring:focus { outline: none; box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3); }
    </style>
</head>
<body class="dark bg-dark-bg text-dark-text min-h-screen flex flex-col antialiased">
    <!-- Header -->
    <header class="border-b border-dark-border bg-dark-card/90 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-3xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-red-600/10 rounded-lg border border-red-500/20 text-red-500">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M23.498 6.186a3.167 3.167 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.167 3.167 0 0 0 .502 6.186C0 7.614 0 12 0 12s0 4.386.502 5.814a3.156 3.156 0 0 0 2.122 2.136C4.495 20.455 12 20.455 12 20.455s7.505 0 9.376-.505a3.156 3.156 0 0 0 2.122-2.136C24 16.386 24 12 24 12s0-4.386-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight text-dark-text">Private Downloader</h1>
                    <p class="text-xs text-dark-muted">Direct YouTube Stream Extractor</p>
                </div>
            </div>

            <!-- Engine Selection Dropdown -->
            <div class="flex items-center gap-2">
                <label for="engine-select" class="text-xs text-dark-muted font-medium">Engine:</label>
                <select id="engine-select" class="bg-dark-bg border border-dark-border rounded-lg px-3 py-1.5 text-xs text-dark-text font-mono focus-ring">
                    <option value="cloud" selected>24/7 Residential Proxy Engine</option>
                    <option value="local">Local IP (127.0.0.1:5000)</option>
                    <option value="custom">Custom IP / Tunnel URL</option>
                </select>
            </div>
        </div>
        
        <!-- Custom IP input field (hidden by default unless selected) -->
        <div id="custom-ip-container" class="hidden border-t border-dark-border bg-dark-bg/80 px-4 py-2">
            <div class="max-w-3xl mx-auto flex items-center gap-2">
                <span class="text-xs text-dark-muted">Custom Engine URL:</span>
                <input type="text" id="custom-ip-input" placeholder="http://192.168.1.5:5000 or https://xyz.loca.lt" class="flex-1 bg-dark-card border border-dark-border rounded px-2.5 py-1 text-xs font-mono text-dark-text focus-ring">
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 max-w-3xl mx-auto w-full px-4 py-8">
        <!-- Input Form Card -->
        <section class="bg-dark-card border border-dark-border rounded-xl p-6 shadow-xl" id="input-section">
            <form id="url-form" class="space-y-4">
                <div>
                    <label for="url-input" class="block text-sm font-medium text-dark-text mb-2">Paste YouTube Video Link</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-dark-muted">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                            </svg>
                        </div>
                        <input
                            type="url"
                            id="url-input"
                            name="url"
                            placeholder="https://www.youtube.com/watch?v=..."
                            required
                            class="w-full bg-dark-bg border border-dark-border rounded-lg pl-10 pr-4 py-3 text-dark-text placeholder-dark-muted focus-ring focus:border-dark-accent transition-all text-sm"
                            autocomplete="off"
                        >
                    </div>
                </div>
                <button
                    type="submit"
                    id="analyze-btn"
                    class="w-full bg-dark-accent hover:bg-dark-accentHover text-slate-950 font-bold py-3 px-6 rounded-lg transition-all focus-ring disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 text-sm shadow-md"
                >
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                    <span id="btn-text">Analyze Link</span>
                    <div class="spinner w-4 h-4 rounded-full border-2 border-slate-900 border-t-transparent hidden"></div>
                </button>
            </form>
        </section>

        <!-- Hidden Result Dashboard Section -->
        <section id="result-section" class="hidden mt-6 space-y-6 fade-in" aria-live="polite">
            <article class="bg-dark-card border border-dark-border rounded-xl overflow-hidden shadow-xl" id="video-card">
                <div class="p-6">
                    <div class="flex flex-col md:flex-row gap-6">
                        <div class="md:w-64 flex-shrink-0 relative">
                            <img id="thumbnail" src="" alt="Video thumbnail" class="w-full aspect-video object-cover rounded-lg border border-dark-border shadow-md">
                            <div class="absolute bottom-2 right-2 bg-black/85 backdrop-blur-sm text-xs text-white px-2 py-0.5 rounded font-mono border border-white/10" id="duration"></div>
                        </div>
                        <div class="flex-1 min-w-0">
                            <h2 id="video-title" class="text-base font-semibold text-dark-text line-clamp-2 mb-3"></h2>
                            <p class="text-xs text-dark-muted font-medium uppercase tracking-wider mb-2">Available Quality Levels</p>
                            
                            <!-- Dynamic Scrollable Menu of Resolutions -->
                            <div class="space-y-2 max-h-56 overflow-y-auto scrollbar-thin pr-1" id="quality-list" role="listbox">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Footer Action Bar -->
                <div class="border-t border-dark-border px-6 py-4 bg-dark-bg/60 flex items-center justify-between gap-4">
                    <span class="text-xs text-dark-muted hidden md:inline">Downloads full MP4 with audio combined</span>
                    <button
                        type="button"
                        id="download-btn"
                        class="w-full md:w-auto bg-dark-success hover:bg-dark-successHover text-white font-bold py-2.5 px-6 rounded-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 text-sm shadow-md"
                        disabled
                    >
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                        </svg>
                        <span id="download-btn-text">Download to Device</span>
                        <div id="download-spinner" class="spinner w-4 h-4 rounded-full border-2 border-white border-t-transparent hidden"></div>
                    </button>
                </div>
            </article>

            <!-- Error Banner -->
            <div id="error-alert" class="hidden bg-red-950/40 border border-red-800/50 text-red-300 rounded-xl p-4 flex flex-col gap-3 shadow-lg" role="alert">
                <div class="flex items-start gap-3">
                    <svg class="w-5 h-5 text-red-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <div class="flex-1">
                        <h3 class="text-sm font-semibold text-red-200">Extraction Error</h3>
                        <p id="error-message" class="text-xs text-red-300/90 mt-1"></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="border-t border-dark-border bg-dark-card/30 py-6 mt-auto">
        <div class="max-w-3xl mx-auto px-4 text-center text-xs text-dark-muted space-y-1">
            <p>Private YouTube Stream Extractor — Built with Flask & Tailwind CSS</p>
            <p class="font-mono text-dark-muted/80">Powered by 24/7 Residential Proxy Engine & Render Cloud</p>
        </div>
    </footer>

    <!-- Frontend Application Logic -->
    <script>
        const form = document.getElementById('url-form');
        const urlInput = document.getElementById('url-input');
        const analyzeBtn = document.getElementById('analyze-btn');
        const btnText = document.getElementById('btn-text');
        const btnSpinner = analyzeBtn.querySelector('.spinner');
        const resultSection = document.getElementById('result-section');
        const videoCard = document.getElementById('video-card');
        const thumbnail = document.getElementById('thumbnail');
        const videoTitle = document.getElementById('video-title');
        const durationEl = document.getElementById('duration');
        const qualityList = document.getElementById('quality-list');
        const downloadBtn = document.getElementById('download-btn');
        const downloadBtnText = document.getElementById('download-btn-text');
        const downloadSpinner = document.getElementById('download-spinner');
        const errorAlert = document.getElementById('error-alert');
        const errorMessage = document.getElementById('error-message');
        const engineSelect = document.getElementById('engine-select');
        const customIpContainer = document.getElementById('custom-ip-container');
        const customIpInput = document.getElementById('custom-ip-input');

        let selectedFormatId = null;
        let activeVideoUrl = '';

        engineSelect.addEventListener('change', () => {
            if (engineSelect.value === 'custom') {
                customIpContainer.classList.remove('hidden');
            } else {
                customIpContainer.classList.add('hidden');
            }
        });

        function getApiBaseUrl() {
            const mode = engineSelect.value;
            if (mode === 'local') return 'http://127.0.0.1:5000';
            if (mode === 'custom') {
                const val = customIpInput.value.trim();
                return val ? (val.startsWith('http') ? val : `http://${val}`) : 'http://127.0.0.1:5000';
            }
            return window.location.origin;
        }

        function formatDuration(seconds) {
            if (!seconds) return '--:--';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            return h > 0 
                ? `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}` 
                : `${m}:${s.toString().padStart(2, '0')}`;
        }

        function setLoading(loading) {
            analyzeBtn.disabled = loading;
            btnText.textContent = loading ? 'Analyzing Link...' : 'Analyze Link';
            btnSpinner.classList.toggle('hidden', !loading);
            urlInput.disabled = loading;
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorAlert.classList.remove('hidden');
            resultSection.classList.remove('hidden');
            videoCard.classList.add('hidden');
            downloadBtn.disabled = true;
        }

        function hideError() {
            errorAlert.classList.add('hidden');
            videoCard.classList.remove('hidden');
        }

        function clearQualitySelection() {
            selectedFormatId = null;
            downloadBtn.disabled = true;
            qualityList.querySelectorAll('.quality-option').forEach(el => el.classList.remove('selected'));
        }

        function renderQualityOptions(formats) {
            qualityList.innerHTML = '';
            if (!formats || formats.length === 0) {
                qualityList.innerHTML = '<p class="text-dark-muted text-xs py-4 text-center">No video quality options found for this link.</p>';
                return;
            }
            formats.forEach((fmt) => {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'quality-option w-full text-left p-3 rounded-lg border border-dark-border flex items-center justify-between gap-3 text-sm';
                button.dataset.formatId = fmt.format_id;
                button.setAttribute('role', 'option');
                button.setAttribute('aria-selected', 'false');
                button.innerHTML = `
                    <div class="flex items-center gap-3 min-w-0">
                        <span class="font-mono font-semibold text-dark-accent">${fmt.label}</span>
                        <span class="text-xs font-mono text-dark-muted bg-dark-bg px-2 py-0.5 rounded border border-dark-border">${fmt.size}</span>
                    </div>
                    <svg class="w-4 h-4 text-emerald-400 hidden checkmark flex-shrink-0" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                    </svg>
                `;
                button.addEventListener('click', () => selectQuality(button, fmt.format_id));
                qualityList.appendChild(button);
            });
        }

        function selectQuality(element, formatId) {
            qualityList.querySelectorAll('.quality-option').forEach(el => {
                el.classList.remove('selected');
                el.setAttribute('aria-selected', 'false');
                const checkmark = el.querySelector('.checkmark');
                if (checkmark) checkmark.classList.add('hidden');
            });
            element.classList.add('selected');
            element.setAttribute('aria-selected', 'true');
            const checkmark = element.querySelector('.checkmark');
            if (checkmark) checkmark.classList.remove('hidden');
            
            selectedFormatId = formatId;
            downloadBtn.disabled = false;
        }

        async function fetchInfo(url) {
            const baseUrl = getApiBaseUrl();
            const res = await fetch(`${baseUrl}/fetch-info`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            });

            const contentType = res.headers.get('content-type') || '';
            if (!contentType.includes('application/json')) {
                const text = await res.text();
                throw new Error(`Server returned non-JSON response (${res.status}): ${text.slice(0, 100)}`);
            }

            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Failed to analyze YouTube video');
            return data;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const url = urlInput.value.trim();
            if (!url) return;

            hideError();
            clearQualitySelection();
            resultSection.classList.add('hidden');
            setLoading(true);

            try {
                const data = await fetchInfo(url);
                activeVideoUrl = url;
                thumbnail.src = data.thumbnail;
                thumbnail.alt = `Thumbnail for ${data.title}`;
                videoTitle.textContent = data.title;
                durationEl.textContent = formatDuration(data.duration);
                renderQualityOptions(data.formats);
                
                resultSection.classList.remove('hidden');
                videoCard.classList.remove('hidden');
            } catch (err) {
                showError(err.message);
            } finally {
                setLoading(false);
            }
        });

        downloadBtn.addEventListener('click', () => {
            if (!selectedFormatId || !activeVideoUrl) return;

            downloadBtn.disabled = true;
            downloadBtnText.textContent = 'Processing Video + Audio...';
            downloadSpinner.classList.remove('hidden');

            const baseUrl = getApiBaseUrl();
            const downloadUrl = `${baseUrl}/download?url=${encodeURIComponent(activeVideoUrl)}&format_id=${encodeURIComponent(selectedFormatId)}`;
            window.location.href = downloadUrl;

            setTimeout(() => {
                downloadBtnText.textContent = 'Download to Device';
                downloadSpinner.classList.add('hidden');
                downloadBtn.disabled = false;
            }, 5000);
        });
    </script>
</body>
</html>
